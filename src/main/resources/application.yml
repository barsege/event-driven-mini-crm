server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mini_crm
    username: mini_crm_user
    password: mini_crm_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092
    
  logging:
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId}] %logger{36} - %msg%n"

